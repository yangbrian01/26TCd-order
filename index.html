<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>26TCd點餐</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #f3ffec; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
    button { touch-action: manipulation; cursor: pointer; position: relative; z-index: 10; user-select: none; }
    .loading-spinner { border-top-color: #34d399; border-radius: 50%; width: 1.5rem; height: 1.5rem; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); z-index: 9999 !important; display: flex; justify-content: center; align-items: center; padding: 1rem; }
    .marquee-container { overflow: hidden; white-space: nowrap; position: relative; width: 100%; }
    .marquee-content { display: inline-block; white-space: nowrap; animation: marquee 40s linear infinite; }
    .marquee-container:hover .marquee-content, .marquee-container:active .marquee-content { animation-play-state: paused; }
    @keyframes marquee { 0% { transform: translateX(10px); } 100% { transform: translateX(-100%); } }
    .menu-card { transition: all 0.2s ease-in-out; }
    .menu-card:active { transform: scale(0.98); }
    .img-container img { transition: transform 0.3s ease; }
    .menu-card:hover .img-container img { transform: scale(1.05); }
    ::-webkit-scrollbar { height: 6px; width: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    /* 確保底部安全距離給 iOS 裝置 */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body class="p-4 sm:p-8 min-h-screen flex flex-col items-center justify-start relative transition-all duration-300" id="main-body">

  <button onclick="openAdminPwdModal()" class="fixed bottom-6 right-6 bg-red-100 text-red-700 p-4 rounded-full shadow-xl hover:bg-red-200 font-bold ring-2 ring-red-300 z-40 flex items-center justify-center transition hover:scale-105">
    <span class="text-xl"></span>
  </button>

  <div id="main-container" class="w-full max-w-xl bg-white shadow-2xl rounded-2xl p-4 sm:p-8 space-y-6 ring-4 ring-green-300/50 relative flex flex-col min-h-[80vh] transition-all duration-300">
    <div class="flex-grow space-y-6">
        <header class="text-center pb-4 border-b border-gray-200">
        <h1 class="text-4xl font-extrabold text-green-700">🍝 26TCd點餐 🥤</h1>
        <p id="user-info-display" class="text-sm mt-2 text-gray-500">輸入姓名開始點餐</p>
        </header>

        <div id="announcement-box" class="hidden bg-yellow-100 border-l-4 border-yellow-500 text-yellow-800 p-3 rounded shadow-sm text-lg font-bold flex items-center gap-2 cursor-pointer" title="按住可暫停捲動">
            <span class="text-2xl flex-shrink-0">📢</span>
            <div class="marquee-container"><span id="announcement-text" class="marquee-content"></span></div>
        </div>

        <div id="message-box" class="hidden"></div>

        <section id="auth-section" class="space-y-6 pt-2">
          <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
              <input type="text" name="username" placeholder="請輸入姓名 (須與名單相符)" required class="w-full p-4 border-2 border-green-200 rounded-xl focus:ring-green-500 focus:border-green-500 transition text-center text-lg font-bold text-gray-700">
              <button type="submit" id="login-btn" class="w-full py-4 bg-green-600 text-white font-bold rounded-xl shadow-md hover:bg-green-700 transition duration-200 text-lg">進入點餐</button>
          </form>
        </section>

        <section id="order-section" class="space-y-6 hidden">
          <div class="flex justify-between items-center">
              <h2 class="text-2xl font-bold text-gray-700">今日菜單</h2>
          </div>
          <div id="loading-message" class="text-center text-gray-400 p-8 hidden"><div class="loading-spinner border-4 border-gray-200 border-t-green-500 inline-block"></div> 正在載入資料...</div>
          <div id="menu-container" class="space-y-8 transition-opacity duration-300">
            <div>
              <h3 id="lunch-title" class="text-xl font-bold text-orange-600 border-b pb-2 mb-4">🍝 午餐 (擇一)</h3>
              <div id="lunch-list" class="grid grid-cols-1 gap-4"></div>
            </div>
            <div>
              <h3 id="drink-title" class="text-xl font-bold text-teal-600 border-b pb-2 mb-4">🥤 飲料 (擇一)</h3>
              <div id="drink-list" class="grid grid-cols-1 gap-4"></div>
            </div>
          </div>
          <div id="cart-summary" class="pt-6 border-t border-gray-200 space-y-4">
              <h3 class="text-xl font-bold text-gray-700">已選內容 / 點餐紀錄</h3>
              <div id="cart-list" class="space-y-3"><p class="text-sm text-gray-500">尚未選擇。</p></div>
          </div>
          <div class="pt-6 border-t border-green-200 space-y-4">
              <div class="flex justify-between items-center text-3xl font-extrabold"><span>總計:</span><span id="total-price" class="text-red-600">NT$ 0</span></div>
              <button id="submit-button" onclick="submitOrder()" disabled class="w-full py-4 px-4 bg-green-500 text-white font-bold text-lg rounded-xl shadow-xl hover:bg-green-600 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">請選擇餐點</button>
          </div>
        </section>
    </div>

    <div class="text-center text-sm text-gray-400 pt-4 border-t border-gray-100 w-full mt-auto font-medium">
      &copy; 2026 Yang Technology 版權所有 | Professional Order System
    </div>
  </div>

  <div id="floating-cart" class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.15)] z-50 transform translate-y-full transition-transform duration-300 pb-safe">
    <div class="max-w-xl mx-auto px-5 py-3 flex justify-between items-center">
        <div class="flex flex-col">
            <span class="text-sm text-gray-500 font-bold" id="floating-cart-count">已選 0 項</span>
            <span class="text-2xl font-extrabold text-red-600" id="floating-cart-total">NT$ 0</span>
        </div>
        <button onclick="scrollToCart()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold shadow-md hover:bg-indigo-700 transition flex items-center gap-2">
            查看明細 ➔
        </button>
    </div>
  </div>

  <div id="options-modal" class="modal-overlay hidden z-[9999]">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md flex flex-col max-h-[90vh] overflow-hidden transform transition-all duration-300 relative">
      <div id="modal-image-container" class="relative w-full h-48 sm:h-56 bg-gray-100 flex-shrink-0 hidden">
        <img id="modal-image" src="" class="w-full h-full object-cover">
        <button onclick="closeOptionsModal()" class="absolute top-3 right-3 bg-black/50 text-white rounded-full w-8 h-8 flex items-center justify-center text-xl hover:bg-black/70 transition z-10">&times;</button>
      </div>
      <div id="modal-header-no-img" class="flex justify-between items-center p-4 border-b flex-shrink-0 hidden">
        <h2 id="modal-title-no-img" class="text-xl font-bold text-gray-800"></h2>
        <button onclick="closeOptionsModal()" class="text-gray-400 hover:text-gray-600 text-3xl font-bold leading-none">&times;</button>
      </div>
      <div class="p-5 overflow-y-auto flex-grow space-y-6">
        <h2 id="modal-title-with-img" class="text-2xl font-bold text-gray-800 hidden border-b pb-2"></h2>
        <div id="modal-content" class="space-y-6"></div>
      </div>
      <div class="p-4 border-t bg-gray-50 flex-shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <button id="add-to-cart-btn" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-lg text-lg hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed shadow-md" onclick="confirmOptions()">確認選擇</button>
      </div>
    </div>
  </div>

  <div id="pwd-modal" class="modal-overlay hidden z-[9999]">
    <div class="bg-white rounded-xl shadow-2xl p-6 space-y-6 w-80 text-center">
      <h2 class="text-2xl font-bold text-red-700 border-b pb-2">管理員登入</h2>
      <input type="password" id="admin-pwd-input" placeholder="請輸入密碼 (預設: 0000)" class="w-full p-3 border rounded-lg text-center font-bold">
      <div class="flex justify-end gap-3 pt-2">
        <button onclick="closeAdminPwdModal()" class="flex-1 py-2 bg-gray-200 rounded-lg font-bold">取消</button>
        <button id="pwd-submit-btn" onclick="verifyAdmin()" class="flex-1 py-2 bg-red-600 text-white rounded-lg font-bold">確認</button>
      </div>
    </div>
  </div>

  <div id="system-modal" class="modal-overlay hidden z-[10000]">
    <div class="bg-white w-80 rounded-xl shadow-2xl p-6 text-center space-y-4">
       <div id="system-modal-icon" class="text-4xl">⚠️</div>
       <h3 class="text-lg font-bold text-gray-800">系統提示</h3>
       <p id="system-modal-message" class="text-sm text-gray-600 leading-relaxed"></p>
       <div class="flex justify-center gap-3 pt-2">
          <button id="system-modal-cancel" onclick="closeSystemModal()" class="flex-1 py-2 bg-gray-200 text-gray-700 rounded-lg font-bold">取消</button>
          <button id="system-modal-confirm" class="flex-1 py-2 bg-red-600 text-white rounded-lg font-bold">確定</button>
       </div>
    </div>
  </div>

  <div id="image-preview-modal" class="modal-overlay hidden z-[10000]" onclick="closeImagePreview(event)">
     <div class="relative bg-white p-2 rounded-lg max-w-sm w-full mx-4 shadow-2xl text-center" onclick="event.stopPropagation()">
        <p class="text-sm text-gray-500 mb-2 font-bold">請長按圖片儲存，或截圖保存</p>
        <img id="preview-img" src="" class="w-full h-auto rounded border border-gray-200">
        <button onclick="closeImagePreview()" class="mt-4 w-full py-2 bg-gray-200 rounded-lg font-bold text-gray-700">關閉</button>
     </div>
  </div>

  <section id="admin-section" class="hidden fixed inset-0 w-full h-full bg-gray-100 z-50 flex flex-col">
    <div class="bg-white shadow-sm p-4 flex-none z-10">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
          <h2 class="text-xl sm:text-2xl font-bold text-red-700"> 後台管理系統</h2>
          <button onclick="closeAdminPanel()" class="px-4 py-2 bg-gray-200 rounded-lg text-sm font-bold hover:bg-gray-300 transition">退出管理</button>
        </div>
    </div>
    
    <div class="bg-white border-b flex-none z-10">
      <div class="max-w-4xl mx-auto px-4 flex space-x-2 overflow-x-auto">
        <button onclick="switchAdminTab('orders')" id="tab-btn-orders" class="px-4 py-3 text-red-600 border-b-2 border-red-600 font-bold whitespace-nowrap">名單對帳</button>
        <button onclick="switchAdminTab('summary')" id="tab-btn-summary" class="px-4 py-3 text-gray-500 whitespace-nowrap">訂購統計</button>
        <button onclick="switchAdminTab('menu')" id="tab-btn-menu" class="px-4 py-3 text-gray-500 whitespace-nowrap">📝 菜單編輯</button>
        <button onclick="switchAdminTab('settings')" id="tab-btn-settings" class="px-4 py-3 text-gray-500 whitespace-nowrap">⚙️ 系統設定</button>
      </div>
    </div>
    
    <div class="flex-grow overflow-y-auto p-4 sm:p-6">
        <div class="max-w-4xl mx-auto space-y-6">
          
          <div id="admin-tab-orders" class="space-y-4">
              <div class="bg-white p-3 rounded-lg shadow-sm border space-y-3">
                  <div class="flex justify-between items-center gap-2">
                      <input type="text" id="order-search-input" oninput="applyOrderFilters()" placeholder="🔍 搜尋姓名..." class="p-2 border rounded-lg outline-none flex-grow">
                      <button onclick="confirmResetOrders()" class="bg-red-600 text-white px-3 py-2 rounded shadow text-sm font-bold flex-shrink-0">⚠️ 清空</button>
                  </div>
                  <div class="flex flex-wrap items-center gap-2 border-t pt-3">
                      <button onclick="setOrderFilter('all')" id="filter-btn-all" class="px-3 py-1 bg-gray-800 text-white rounded shadow text-sm font-bold">全部</button>
                      <button onclick="setOrderFilter('unordered')" id="filter-btn-unordered" class="px-3 py-1 bg-gray-200 text-gray-700 rounded shadow text-sm font-bold hover:bg-gray-300">未點餐</button>
                      <button onclick="setOrderFilter('unpaid')" id="filter-btn-unpaid" class="px-3 py-1 bg-gray-200 text-gray-700 rounded shadow text-sm font-bold hover:bg-gray-300">未繳費</button>
                      <div class="flex-grow"></div>
                      <button onclick="copyUnpaidList()" class="px-3 py-1 bg-yellow-500 text-white rounded shadow text-sm font-bold hover:bg-yellow-600 transition">📋 複製催繳名單</button>
                  </div>
              </div>
              <div id="admin-order-list" class="space-y-2 pb-10"></div>
          </div>

          <div id="admin-tab-summary" class="hidden space-y-4">
              <div class="flex gap-2 bg-gray-200 p-1 rounded-lg">
                <button id="summary-btn-lunch" onclick="renderSummaryTable('lunch')" class="flex-1 py-2 bg-white rounded shadow text-orange-600 font-bold transition">午餐統計</button>
                <button id="summary-btn-drink" onclick="renderSummaryTable('drink')" class="flex-1 py-2 text-gray-500 hover:bg-gray-300 rounded font-bold transition">飲料統計</button>
              </div>
              <div class="flex justify-end"><button onclick="captureSummary()" class="px-4 py-2 bg-blue-600 text-white text-sm font-bold rounded-lg shadow">📸 匯出此頁統計</button></div>
              <div id="summary-capture-area" class="p-2 bg-white rounded-xl">
                  <div class="bg-green-50 p-6 rounded-xl text-center shadow-inner border border-green-100 mb-4">
                      <p id="admin-summary-title" class="text-gray-600 font-medium">本次應收總金額</p>
                      <p id="admin-grand-total" class="text-4xl font-extrabold text-green-700 mt-2">NT$ 0</p>
                  </div>
                  <table class="w-full text-left text-sm bg-white rounded-lg shadow-sm border"><tbody id="admin-summary-list" class="divide-y divide-gray-100"></tbody></table>
              </div>
          </div>

          <div id="admin-tab-menu" class="hidden space-y-4 pb-20">
            <div class="flex gap-2 bg-gray-200 p-1 rounded-lg">
              <button id="menu-tab-lunch" onclick="renderAdminMenuList('lunch')" class="flex-1 py-2 bg-white rounded shadow text-orange-600 font-bold transition">午餐菜單</button>
              <button id="menu-tab-drink" onclick="renderAdminMenuList('drink')" class="flex-1 py-2 text-gray-500 hover:bg-gray-300 rounded font-bold transition">飲料菜單</button>
            </div>
            <div class="flex justify-between items-center mb-2">
              <h3 id="admin-menu-title" class="font-bold text-gray-700 text-lg">編輯清單</h3>
              <button onclick="openMenuEditorModal(-1)" class="bg-green-600 text-white px-3 py-1.5 rounded-lg shadow text-sm font-bold hover:bg-green-700">+ 新增品項</button>
            </div>
            <div id="admin-menu-list-container" class="space-y-3"></div>
            <button id="save-menu-server-btn" onclick="saveMenuToServer()" class="w-full py-4 mt-6 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition flex justify-center items-center gap-2">
              ☁️ 將此分類儲存至雲端試算表
            </button>
          </div>

          <div id="admin-tab-settings" class="hidden space-y-4 pb-10"></div>
        </div>
    </div>
  </section>

  <div id="menu-editor-modal" class="modal-overlay hidden z-[10000]">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg flex flex-col max-h-[95vh] relative">
      <div class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl">
        <h2 id="editor-modal-title" class="text-xl font-bold text-gray-800">編輯品項</h2>
        <button onclick="closeMenuEditorModal()" class="text-gray-400 hover:text-gray-600 text-3xl font-bold leading-none">&times;</button>
      </div>
      <div class="p-5 overflow-y-auto space-y-4 flex-grow">
        <div class="space-y-3">
          <div><label class="block text-sm font-bold text-gray-700 mb-1">品項名稱 <span class="text-red-500">*</span></label><input type="text" id="edit-item-name" class="w-full p-2 border rounded-lg outline-none focus:ring-2 ring-blue-300"></div>
          <div><label class="block text-sm font-bold text-gray-700 mb-1">基本價格 <span class="text-red-500">*</span></label><input type="number" id="edit-item-price" class="w-full p-2 border rounded-lg outline-none focus:ring-2 ring-blue-300" placeholder="0"></div>
          <div><label class="block text-sm font-bold text-gray-700 mb-1">圖片網址 (選填)</label><input type="text" id="edit-item-image" class="w-full p-2 border rounded-lg outline-none focus:ring-2 ring-blue-300 text-sm" placeholder="https://..."></div>
        </div>
        <hr>
        <div>
          <div class="flex justify-between items-center mb-2">
            <label class="block text-base font-bold text-indigo-700">🛒 加購與客製化選項</label>
            <button onclick="addOptionGroup()" class="text-sm bg-indigo-100 text-indigo-700 px-2 py-1 rounded font-bold hover:bg-indigo-200">+ 新增群組</button>
          </div>
          <p class="text-xs text-gray-500 mb-3">例如：新增「甜度」群組，裡面包含「正常(+0)」、「半糖(+0)」</p>
          <div id="options-builder-container" class="space-y-3"></div>
        </div>
      </div>
      <div class="p-4 border-t bg-gray-50 flex gap-3 rounded-b-xl">
        <button onclick="closeMenuEditorModal()" class="flex-1 py-3 bg-gray-200 text-gray-700 font-bold rounded-lg hover:bg-gray-300">取消</button>
        <button onclick="saveItemToLocalData()" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 shadow-md">暫存品項</button>
      </div>
    </div>
  </div>

  <script>
    let currentUsername = null;
    let cart = { lunch: null, drink: null }; 
    let configuringItem = null; 
    let onConfirmCallback = null;
    let cachedSummaryData = null; 
    let storeNames = { lunch: '午餐', drink: '飲料' };

    let adminMenuData = { lunch: [], drink: [] };
    let currentMenuTab = 'lunch';
    let editingItemIndex = -1; 
    let currentEditOptions = {};
    let currentOrderFilter = 'all';

    function showConfirmModal(msg, cb, isDanger=false) {
        document.getElementById('system-modal-message').textContent = msg;
        onConfirmCallback = cb;
        const confirmBtn = document.getElementById('system-modal-confirm');
        confirmBtn.onclick = () => { if(onConfirmCallback) onConfirmCallback(); closeSystemModal(); };
        confirmBtn.className = isDanger ? "flex-1 py-2 bg-red-600 text-white rounded-lg font-bold" : "flex-1 py-2 bg-blue-600 text-white rounded-lg font-bold";
        document.getElementById('system-modal-icon').textContent = isDanger ? "⚠️" : "ℹ️";
        document.getElementById('system-modal-cancel').classList.remove('hidden');
        document.getElementById('system-modal').classList.remove('hidden');
    }
    function showAlertModal(msg) {
        document.getElementById('system-modal-message').textContent = msg;
        document.getElementById('system-modal-icon').textContent = "✅";
        const confirmBtn = document.getElementById('system-modal-confirm');
        confirmBtn.onclick = closeSystemModal;
        confirmBtn.className = "flex-1 py-2 bg-green-600 text-white rounded-lg font-bold";
        document.getElementById('system-modal-cancel').classList.add('hidden');
        document.getElementById('system-modal').classList.remove('hidden');
    }
    function closeSystemModal() { document.getElementById('system-modal').classList.add('hidden'); onConfirmCallback = null; }
    function closeImagePreview(e) { if(e && e.target !== e.currentTarget) return; document.getElementById('image-preview-modal').classList.add('hidden'); }
    function showMessage(msg, styleClass) {
      const box = document.getElementById('message-box');
      box.className = `${styleClass} p-3 rounded-xl text-center font-medium shadow-md mt-4`;
      box.textContent = msg; box.classList.remove('hidden');
    }

    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxhvM2kLE9SGZs1_pY-thrY4ugUBSqyJz3KmTl5yW0T5TiDv_bgFsQXRxQ7bkfFh9EM/exec'; 

    function runGas(funcName, onSuccess, onFail, ...args) {
        fetch(GAS_WEB_APP_URL, {
            redirect: "follow", 
            method: 'POST',
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ action: funcName, args: args })
        })
        .then(response => response.json())
        .then(data => {
            if(data.error) onFail(new Error(data.message));
            else onSuccess(data);
        })
        .catch(err => {
            console.error("API 請求錯誤:", err);
            onFail(err);
        });
    }
    function showGasError(err) { showAlertModal(`伺服器錯誤: ${err.message}`); }

    window.onload = () => {
      runGas('getBasicSettings', res => {
        storeNames.lunch = res.lunchStore || '午餐';
        storeNames.drink = res.drinkStore || '飲料';

        document.getElementById('lunch-title').textContent = `🍝 ${storeNames.lunch} (擇一)`;
        document.getElementById('drink-title').textContent = `🥤 ${storeNames.drink} (擇一)`;
        document.getElementById('summary-btn-lunch').textContent = `${storeNames.lunch}統計`;
        document.getElementById('summary-btn-drink').textContent = `${storeNames.drink}統計`;
        document.getElementById('menu-tab-lunch').textContent = `${storeNames.lunch}菜單`;
        document.getElementById('menu-tab-drink').textContent = `${storeNames.drink}菜單`;

        if (res.announcement) {
          document.getElementById('announcement-text').textContent = res.announcement;
          document.getElementById('announcement-box').classList.remove('hidden');
        }
        if (res.isClosed) {
          const btn = document.getElementById('login-btn');
          btn.disabled = true;
          btn.textContent = `已超過截單時間 (${res.cutoffStr})`;
          btn.classList.replace('bg-green-600', 'bg-gray-500');
          btn.classList.replace('hover:bg-green-700', 'hover:bg-gray-500');
        }
      }, showGasError);
    };

    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true; btn.textContent = "驗證中...";
      const username = e.target.username.value.trim();
      runGas('checkUserLogin', res => {
        btn.disabled = false; btn.textContent = "進入點餐";
        if(res.success){
          currentUsername = res.username;
          document.getElementById('auth-section').classList.add('hidden');
          document.getElementById('order-section').classList.remove('hidden');
          document.getElementById('user-info-display').textContent = `嗨，${currentUsername}！`;
          
          if (res.hasOrdered) {
            document.getElementById('menu-container').classList.add('hidden');
            document.getElementById('cart-list').innerHTML = `
              <div class="p-4 bg-blue-50 border border-blue-200 rounded-lg text-blue-800 shadow-sm">
                <p class="font-bold mb-3 text-lg flex items-center gap-2"><span class="text-2xl">✅</span> 您已完成點餐</p>
                <div class="space-y-2 bg-white p-3 rounded border border-blue-100">
                  <p class="text-sm"><span class="font-bold text-gray-700">午餐：</span> ${res.lunch}</p>
                  <p class="text-sm"><span class="font-bold text-gray-700">飲料：</span> ${res.drink}</p>
                </div>
              </div>`;
            document.getElementById('total-price').textContent = `NT$ ${res.total}`;
            const submitBtn = document.getElementById('submit-button');
            submitBtn.disabled = true; submitBtn.textContent = "已完成點餐";
          } else { loadMenu(); }
        } else { showMessage(res.message, "bg-red-100 text-red-700"); }
      }, showGasError, username);
    }

    function loadMenu() {
      document.getElementById('loading-message').classList.remove('hidden');
      document.getElementById('menu-container').classList.add('hidden');
      runGas('getSystemData', res => {
        document.getElementById('loading-message').classList.add('hidden');
        if(res.isClosed) {
          document.getElementById('menu-container').innerHTML = `<div class="p-4 bg-red-100 text-red-700 rounded-lg">${res.closeMsg}</div>`;
          document.getElementById('menu-container').classList.remove('hidden');
          const btn = document.getElementById('submit-button');
          btn.disabled = true; btn.textContent = "已關閉點餐";
          return;
        }
        window.menuData = [...res.lunch, ...res.drink]; 
        renderCategory('lunch-list', res.lunch, 'lunch');
        renderCategory('drink-list', res.drink, 'drink');
        document.getElementById('menu-container').classList.remove('hidden');
      }, showGasError);
    }

    function renderCategory(containerId, items, category) {
      const container = document.getElementById(containerId);
      if(items.length === 0) { container.innerHTML = '<p class="text-gray-400 text-sm">無供應</p>'; return; }
      const themeColor = category === 'lunch' ? 'orange' : 'teal';
      const html = items.map(item => {
        const imgHtml = item.image ? `<img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover">` : `<div class="w-full h-full bg-gray-100 flex items-center justify-center text-3xl opacity-50">🍽️</div>`;
        return `
        <div class="menu-card flex p-3 rounded-xl shadow-sm hover:shadow-md ring-1 ring-gray-200 bg-white gap-3 cursor-pointer" onclick="handleItemClick('${item.id}')">
          <div class="img-container flex-shrink-0 w-24 h-24 rounded-lg overflow-hidden border border-gray-100 relative shadow-sm">
              ${imgHtml}
              <div class="absolute bottom-1 right-1 bg-white rounded-full p-0.5 shadow-sm">
                 <div class="bg-${themeColor}-500 text-white w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold">+</div>
              </div>
          </div>
          <div class="flex-grow flex flex-col justify-between py-1 pr-1">
            <div><h3 class="text-lg font-bold text-gray-800 leading-tight">${item.name}</h3></div>
            <div class="flex justify-between items-end mt-2"><span class="text-lg font-extrabold text-gray-800">NT$ ${item.price}</span></div>
          </div>
        </div>`;
      }).join('');
      container.innerHTML = html;
    }

    function handleItemClick(id) {
      const item = window.menuData.find(i => i.id === id);
      if (!item) return;
      if (item.options && Object.keys(item.options).length > 0) { configuringItem = item; openOptionsModal(item); } 
      else {
        cart[item.category] = { id: item.id, name: item.name, price: item.price, selections: {} };
        updateCartUI(); showMessage(`已選擇：${item.name}`, "bg-green-100 text-green-700");
      }
    }

    function openOptionsModal(item) {
      const imgContainer = document.getElementById('modal-image-container');
      const imgElement = document.getElementById('modal-image');
      const titleWithImg = document.getElementById('modal-title-with-img');
      const headerNoImg = document.getElementById('modal-header-no-img');
      const titleNoImg = document.getElementById('modal-title-no-img');

      if (item.image) {
        imgElement.src = item.image; imgContainer.classList.remove('hidden'); headerNoImg.classList.add('hidden');         
        titleWithImg.textContent = item.name; titleWithImg.classList.remove('hidden');     
      } else {
        imgContainer.classList.add('hidden'); headerNoImg.classList.remove('hidden');      
        titleNoImg.textContent = item.name; titleWithImg.classList.add('hidden');        
      }
      
      const content = document.getElementById('modal-content'); content.innerHTML = '';
      Object.keys(item.options).forEach(optionName => {
        const options = item.options[optionName];
        let optionsHtml = options.map((opt, index) => {
          const name = Array.isArray(opt) ? opt[0] : opt;
          const extraPrice = Array.isArray(opt) ? opt[1] : 0;
          const priceLabel = extraPrice > 0 ? ` (+NT$${extraPrice})` : '';
          return `<label class="flex items-center p-3 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 transition"><input type="radio" name="option-${optionName}" value="${name}" data-extra="${extraPrice}" onchange="checkModalSelections()" class="form-radio h-5 w-5 text-indigo-600"><span class="ml-3 text-gray-700 font-medium">${name}${priceLabel}</span></label>`;
        }).join('');
        content.insertAdjacentHTML('beforeend', `<div><h4 class="text-lg font-bold mb-2 text-gray-800">${optionName} <span class="text-red-500 text-xs font-normal ml-1">* 必選</span></h4><div class="space-y-2">${optionsHtml}</div></div>`);
      });
      checkModalSelections(); document.getElementById('options-modal').classList.remove('hidden');
    }

    function closeOptionsModal() { document.getElementById('options-modal').classList.add('hidden'); configuringItem = null; }

    function checkModalSelections() {
      if (!configuringItem) return;
      let extraTotal = 0; let allSelected = true;
      Object.keys(configuringItem.options).forEach(category => {
        const selected = document.querySelector(`input[name="option-${category}"]:checked`);
        if (!selected) allSelected = false; else extraTotal += parseFloat(selected.dataset.extra || 0);
      });
      const btn = document.getElementById('add-to-cart-btn');
      if (allSelected) { btn.disabled = false; btn.textContent = `加入購物車 (NT$${configuringItem.price + extraTotal})`; } 
      else { btn.disabled = true; btn.textContent = `您有選項尚未完成`; }
    }

    function confirmOptions() {
      if (!configuringItem) return;
      let extraTotal = 0; const selections = {};
      document.querySelectorAll('#modal-content input[type="radio"]:checked').forEach(radio => {
        const cat = radio.name.replace('option-', ''); selections[cat] = radio.value; extraTotal += parseFloat(radio.dataset.extra || 0);
      });
      cart[configuringItem.category] = { id: configuringItem.id, name: configuringItem.name, price: configuringItem.price + extraTotal, selections: selections };
      updateCartUI(); showMessage(`已選擇：${configuringItem.name}`, "bg-green-100 text-green-700"); closeOptionsModal();
    }

    function removeCartItem(category) { cart[category] = null; updateCartUI(); }

    // 【新增】懸浮購物車控制與排版邏輯
    function updateCartUI() {
      const listDiv = document.getElementById('cart-list');
      const items = [cart.lunch, cart.drink].filter(i => i !== null);
      let total = 0;
      
      if(items.length === 0) { 
        listDiv.innerHTML = '<p class="text-sm text-gray-500">尚未選擇。</p>'; 
      } else {
        listDiv.innerHTML = items.map(item => {
          total += item.price;
          const cat = item.category || (item.id.startsWith('lunch') ? 'lunch' : 'drink');
          let details = item.selections && Object.keys(item.selections).length > 0 ? `<p class="text-xs text-gray-500 mt-1">${Object.values(item.selections).join(' / ')}</p>` : '';
          return `<div class="flex items-center justify-between p-3 bg-white border-b ring-1 ring-gray-100 rounded-lg shadow-sm"><div><p class="font-bold text-gray-700">${item.name}</p>${details}<p class="text-sm text-red-500 font-medium mt-1">NT$ ${item.price}</p></div><button onclick="removeCartItem('${cat}')" class="text-gray-400 hover:text-red-600 text-2xl font-bold px-2 remove-btn">&times;</button></div>`;
        }).join('');
      }
      
      document.getElementById('total-price').textContent = `NT$ ${total}`;
      const btn = document.getElementById('submit-button');
      btn.disabled = items.length === 0; btn.textContent = items.length === 0 ? "請選擇餐點" : "確認點餐並提交";

      // 控制懸浮購物車的顯示與隱藏
      const floatingCart = document.getElementById('floating-cart');
      const mainContainer = document.getElementById('main-container');
      
      if (items.length > 0) {
        document.getElementById('floating-cart-count').textContent = `已選 ${items.length} 項`;
        document.getElementById('floating-cart-total').textContent = `NT$ ${total}`;
        floatingCart.classList.remove('translate-y-full');
        // 增加主容器底部空間，避免最後一個餐點被懸浮列遮擋
        mainContainer.style.paddingBottom = "5rem"; 
      } else {
        floatingCart.classList.add('translate-y-full');
        mainContainer.style.paddingBottom = "1rem";
      }
    }

    // 【新增】平滑捲動到購物車區域
    function scrollToCart() {
      const cartSummary = document.getElementById('cart-summary');
      if (cartSummary) {
        cartSummary.scrollIntoView({ behavior: 'smooth', block: 'end' });
        // 閃爍一下原本的提交按鈕，引導使用者點擊
        const btn = document.getElementById('submit-button');
        setTimeout(() => {
          btn.classList.add('ring-4', 'ring-green-400', 'scale-105');
          setTimeout(() => btn.classList.remove('ring-4', 'ring-green-400', 'scale-105'), 600);
        }, 300);
      }
    }

    function submitOrder() {
      const items = [cart.lunch, cart.drink].filter(i => i !== null);
      if(items.length === 0) return;
      const btn = document.getElementById('submit-button');
      btn.disabled = true; btn.textContent = "處理中...";
      runGas('logOrderToSheet', res => {
        if(res.success) {
          showAlertModal("✅ 點餐成功！");
          btn.disabled = true; btn.textContent = "已完成點餐";
          document.getElementById('menu-container').classList.add('pointer-events-none', 'opacity-50');
          document.querySelectorAll('.remove-btn').forEach(b => b.classList.add('hidden'));
          // 送出成功後隱藏懸浮列
          document.getElementById('floating-cart').classList.add('translate-y-full');
          document.getElementById('main-container').style.paddingBottom = "1rem";
        } else {
          showAlertModal(res.message); btn.disabled = false; btn.textContent = "確認點餐並提交";
        }
      }, showGasError, { username: currentUsername, lunch: cart.lunch, drink: cart.drink, total: items.reduce((sum, i) => sum + i.price, 0) });
    }

    // --- 後台管理系統 ---
    function openAdminPwdModal() { 
      document.getElementById('admin-pwd-input').value = "";
      document.getElementById('pwd-modal').classList.remove('hidden'); 
    }
    function closeAdminPwdModal() { document.getElementById('pwd-modal').classList.add('hidden'); }
    
    function verifyAdmin() {
      const pwd = document.getElementById('admin-pwd-input').value;
      const btn = document.getElementById('pwd-submit-btn');
      btn.textContent = "驗證中..."; btn.disabled = true;
      runGas('verifyAdminPassword', res => {
        btn.textContent = "確認"; btn.disabled = false;
        if(res.success){
          closeAdminPwdModal();
          document.getElementById('main-container').classList.add('hidden');
          document.getElementById('admin-section').classList.remove('hidden');
          switchAdminTab('orders');
        } else { showAlertModal(res.message); }
      }, showGasError, pwd);
    }

    function closeAdminPanel() {
      document.getElementById('admin-section').classList.add('hidden');
      document.getElementById('main-container').classList.remove('hidden');
    }

    function switchAdminTab(tabName) {
      ['orders', 'summary', 'menu', 'settings'].forEach(t => {
         document.getElementById(`admin-tab-${t}`).classList.add('hidden');
         document.getElementById(`tab-btn-${t}`).classList.replace('text-red-600', 'text-gray-500');
         document.getElementById(`tab-btn-${t}`).classList.remove('border-red-600');
      });
      document.getElementById(`admin-tab-${tabName}`).classList.remove('hidden');
      document.getElementById(`tab-btn-${tabName}`).classList.replace('text-gray-500', 'text-red-600');
      document.getElementById(`tab-btn-${tabName}`).classList.add('border-red-600');
      
      if (tabName === 'orders') loadAdminOrders();
      if (tabName === 'summary') loadAdminSummary();
      if (tabName === 'menu') loadAdminMenuEditor(); 
      if (tabName === 'settings') loadAdminSettings(); 
    }

    function loadAdminOrders() {
      const div = document.getElementById('admin-order-list'); 
      div.innerHTML = '<p class="text-center text-gray-400">載入中...</p>';
      runGas('getAdminOrders', res => {
        if(res.length===0) { div.innerHTML='<p class="text-center">無資料</p>'; return; }
        div.innerHTML = res.map(o => {
          const statusClass = o.paid ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-500';
          const cardBorder = o.hasOrdered ? 'border-green-300' : 'border-gray-200 opacity-60';
          return `
            <div class="bg-white border-2 ${cardBorder} p-3 rounded shadow-sm admin-order-card" data-name="${o.user}" data-has-ordered="${o.hasOrdered}" data-paid="${o.paid}">
              <div class="flex justify-between items-center border-b pb-2 mb-2">
                <span class="font-bold text-lg">${o.user}</span>
                ${o.hasOrdered ? `<button onclick="togglePay(this, ${o.rowIndex})" class="px-3 py-1 rounded-full text-xs font-bold transition ${statusClass}">${o.paid?'已繳費':'未繳費'}</button>` : '<span class="text-xs text-gray-400">尚未點餐</span>'}
              </div>
              <div class="text-sm text-gray-600 whitespace-pre-line">${o.items}</div>
              ${o.hasOrdered ? `<div class="text-right font-bold text-red-600 mt-2">總計: $${o.total}</div>` : ''}
            </div>`;
        }).join('');
        applyOrderFilters(); 
      }, showGasError);
    }

    function setOrderFilter(type) {
        currentOrderFilter = type;
        ['all', 'unordered', 'unpaid'].forEach(t => {
            const btn = document.getElementById(`filter-btn-${t}`);
            if (t === type) {
                btn.classList.replace('bg-gray-200', 'bg-gray-800');
                btn.classList.replace('text-gray-700', 'text-white');
            } else {
                btn.classList.replace('bg-gray-800', 'bg-gray-200');
                btn.classList.replace('text-white', 'text-gray-700');
            }
        });
        applyOrderFilters();
    }

    function applyOrderFilters() {
        const filterText = document.getElementById('order-search-input').value.toUpperCase();
        const cards = document.querySelectorAll('.admin-order-card');
        cards.forEach(card => {
            const name = card.dataset.name.toUpperCase();
            const hasOrdered = card.dataset.hasOrdered === 'true';
            const isPaid = card.dataset.paid === 'true';
            
            let textMatch = name.includes(filterText);
            let stateMatch = true;
            
            if (currentOrderFilter === 'unordered') stateMatch = !hasOrdered;
            if (currentOrderFilter === 'unpaid') stateMatch = hasOrdered && !isPaid;
            
            if (textMatch && stateMatch) card.classList.remove('hidden');
            else card.classList.add('hidden');
        });
    }

    function togglePay(btn, rowIndex) {
      const isPaid = btn.innerText === '已繳費';
      const card = btn.closest('.admin-order-card');
      btn.innerText = isPaid ? '未繳費' : '已繳費';
      btn.className = `px-3 py-1 rounded-full text-xs font-bold transition ${isPaid ? 'bg-gray-200 text-gray-500' : 'bg-green-500 text-white'}`;
      card.dataset.paid = (!isPaid).toString(); 
      runGas('togglePaymentStatus', ()=>{}, showGasError, rowIndex, isPaid);
    }

    function copyUnpaidList() {
        const cards = document.querySelectorAll('.admin-order-card');
        let unpaidNames = [];
        cards.forEach(card => {
            if (card.dataset.hasOrdered === 'true' && card.dataset.paid === 'false') {
                unpaidNames.push(card.dataset.name);
            }
        });
        if (unpaidNames.length === 0) {
            showAlertModal("太棒了！目前大家都已經繳費囉。"); return;
        }
        const textToCopy = `【點餐未繳費名單】\n${unpaidNames.join('、')}\n\n麻煩以上同學盡快繳交費用喔！謝謝～`;
        navigator.clipboard.writeText(textToCopy).then(() => {
            showAlertModal("✅ 催繳名單已複製！\n您可以直接貼上至 LINE 班級群組。");
        }).catch(err => {
            showConfirmModal("複製失敗，請手動複製以下文字：\n\n" + textToCopy, null);
        });
    }

    function loadAdminSummary() {
       document.getElementById('admin-summary-list').innerHTML = '<tr><td colspan="2" class="p-4 text-center">計算中...</td></tr>';
       runGas('getSalesSummary', res => { cachedSummaryData = res; renderSummaryTable('lunch'); }, showGasError);
    }

    function renderSummaryTable(type) {
      if (!cachedSummaryData) return;
      const data = cachedSummaryData[type];
      const btnL = document.getElementById('summary-btn-lunch');
      const btnD = document.getElementById('summary-btn-drink');
      
      if (type === 'lunch') {
        btnL.className = "flex-1 py-2 bg-white rounded shadow text-orange-600 font-bold transition";
        btnD.className = "flex-1 py-2 text-gray-500 hover:bg-gray-300 rounded font-bold transition";
        document.getElementById('admin-summary-title').textContent = `🍝 ${storeNames.lunch} 應收總計`;
      } else {
        btnD.className = "flex-1 py-2 bg-white rounded shadow text-teal-600 font-bold transition";
        btnL.className = "flex-1 py-2 text-gray-500 hover:bg-gray-300 rounded font-bold transition";
        document.getElementById('admin-summary-title').textContent = `🥤 ${storeNames.drink} 應收總計`;
      }
      document.getElementById('admin-grand-total').textContent = `NT$ ${data.grandTotal}`;
      const list = document.getElementById('admin-summary-list');
      if (!data.items.length) { list.innerHTML = '<tr><td colspan="2" class="p-4 text-center">無資料</td></tr>'; } 
      else { list.innerHTML = data.items.map(i => `<tr class="hover:bg-gray-50"><td class="p-3 border-b">${i.name}</td><td class="p-3 border-b text-right font-bold">${i.count}</td></tr>`).join(''); }
    }

    function captureSummary() {
      const el = document.getElementById('summary-capture-area');
      const bg = el.style.backgroundColor; el.style.backgroundColor = "#fff";
      html2canvas(el, { scale: 2 }).then(canvas => {
        el.style.backgroundColor = bg;
        document.getElementById('preview-img').src = canvas.toDataURL("image/png");
        document.getElementById('image-preview-modal').classList.remove('hidden');
      });
    }

    function confirmResetOrders() {
       showConfirmModal("⚠️ 確定要「清空」本次所有紀錄嗎？\n(名單會保留，但點餐內容與狀態會歸零)", () => {
          runGas('resetAllOrders', res => { showAlertModal(res.message); loadAdminOrders(); }, showGasError);
       }, true);
    }

    function loadAdminMenuEditor() {
      document.getElementById('admin-menu-list-container').innerHTML = '<p class="text-center text-gray-400">從雲端讀取菜單中...</p>';
      runGas('getSystemData', res => {
        adminMenuData.lunch = res.lunch || [];
        adminMenuData.drink = res.drink || [];
        renderAdminMenuList(currentMenuTab);
      }, showGasError);
    }

    function renderAdminMenuList(category) {
      currentMenuTab = category;
      const btnL = document.getElementById('menu-tab-lunch');
      const btnD = document.getElementById('menu-tab-drink');
      
      if (category === 'lunch') {
        btnL.className = "flex-1 py-2 bg-white rounded shadow text-orange-600 font-bold transition";
        btnD.className = "flex-1 py-2 text-gray-500 hover:bg-gray-300 rounded font-bold transition";
      } else {
        btnD.className = "flex-1 py-2 bg-white rounded shadow text-teal-600 font-bold transition";
        btnL.className = "flex-1 py-2 text-gray-500 hover:bg-gray-300 rounded font-bold transition";
      }

      const listDiv = document.getElementById('admin-menu-list-container');
      const items = adminMenuData[category];
      
      if(items.length === 0) {
        listDiv.innerHTML = '<div class="text-center p-8 bg-white rounded-lg border border-dashed border-gray-300 text-gray-500">目前沒有品項，點擊右上角新增吧！</div>';
        return;
      }

      listDiv.innerHTML = items.map((item, idx) => {
        const optionCount = item.options ? Object.keys(item.options).length : 0;
        return `
          <div class="flex items-center justify-between p-3 bg-white border border-gray-200 rounded-lg shadow-sm hover:border-blue-300 transition">
            <div class="flex items-center gap-3">
              ${item.image ? `<img src="${item.image}" class="w-12 h-12 rounded object-cover border">` : `<div class="w-12 h-12 rounded bg-gray-100 flex items-center justify-center text-xl">🍽️</div>`}
              <div>
                <p class="font-bold text-gray-800">${item.name}</p>
                <div class="text-xs text-gray-500 flex gap-2">
                  <span class="text-red-500 font-bold">$${item.price}</span>
                  ${optionCount > 0 ? `<span>| ${optionCount} 組客製選項</span>` : ''}
                </div>
              </div>
            </div>
            <div class="flex gap-2">
              <button onclick="openMenuEditorModal(${idx})" class="p-2 bg-blue-100 text-blue-700 rounded hover:bg-blue-200">✎ 編輯</button>
              <button onclick="deleteMenuItemFromLocal(${idx})" class="p-2 bg-red-100 text-red-700 rounded hover:bg-red-200">✖ 刪除</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function openMenuEditorModal(index) {
      editingItemIndex = index;
      if (index === -1) {
        document.getElementById('editor-modal-title').textContent = "新增品項";
        document.getElementById('edit-item-name').value = "";
        document.getElementById('edit-item-price').value = "";
        document.getElementById('edit-item-image').value = "";
        currentEditOptions = {};
      } else {
        const item = adminMenuData[currentMenuTab][index];
        document.getElementById('editor-modal-title').textContent = `編輯：${item.name}`;
        document.getElementById('edit-item-name').value = item.name;
        document.getElementById('edit-item-price').value = item.price;
        document.getElementById('edit-item-image').value = item.image || "";
        currentEditOptions = item.options ? JSON.parse(JSON.stringify(item.options)) : {};
      }
      renderOptionsBuilderUI();
      document.getElementById('menu-editor-modal').classList.remove('hidden');
    }

    function closeMenuEditorModal() { document.getElementById('menu-editor-modal').classList.add('hidden'); }

    function renderOptionsBuilderUI() {
      const container = document.getElementById('options-builder-container');
      const keys = Object.keys(currentEditOptions);
      if (keys.length === 0) {
        container.innerHTML = '<p class="text-sm text-gray-400 text-center py-4 bg-gray-50 rounded border border-dashed">尚未設定任何加購選項</p>';
        return;
      }

      let html = '';
      keys.forEach(groupName => {
        html += `
          <div class="border border-gray-200 p-3 rounded-lg bg-white relative shadow-sm">
            <div class="flex justify-between items-center mb-2">
              <input type="text" value="${groupName}" onchange="renameOptionGroup('${groupName}', this.value)" class="font-bold text-gray-700 bg-transparent border-b border-gray-300 w-1/2 outline-none focus:border-indigo-500 px-1" placeholder="輸入群組名稱(如:甜度)">
              <button onclick="deleteOptionGroup('${groupName}')" class="text-red-500 hover:bg-red-50 px-2 py-1 rounded text-sm font-bold">刪除群組</button>
            </div>
            <div class="space-y-2 pl-2 border-l-2 border-indigo-100">`;

        currentEditOptions[groupName].forEach((opt, idx) => {
          let optName = Array.isArray(opt) ? opt[0] : opt;
          let optPrice = Array.isArray(opt) ? opt[1] : 0;
          html += `
            <div class="flex items-center gap-2">
              <span class="text-gray-400 text-xs">↳</span>
              <input type="text" value="${optName}" onchange="updateOptionItem('${groupName}', ${idx}, 'name', this.value)" class="border border-gray-200 p-1.5 text-sm rounded flex-1 focus:ring-1 ring-indigo-300 outline-none" placeholder="選項名稱(如:半糖)">
              <span class="text-xs text-gray-500 font-bold">+NT$</span>
              <input type="number" value="${optPrice}" onchange="updateOptionItem('${groupName}', ${idx}, 'price', this.value)" class="border border-gray-200 p-1.5 text-sm rounded w-16 text-center focus:ring-1 ring-indigo-300 outline-none" placeholder="0">
              <button onclick="deleteOptionItem('${groupName}', ${idx})" class="text-gray-400 hover:text-red-500 font-bold text-lg px-1">&times;</button>
            </div>`;
        });

        html += `</div><button onclick="addOptionItem('${groupName}')" class="mt-3 text-sm text-indigo-600 font-bold hover:bg-indigo-50 px-2 py-1 rounded flex items-center gap-1">➕ 新增選項</button></div>`;
      });
      container.innerHTML = html;
    }

    function addOptionGroup() {
      const baseName = "新群組";
      let count = 1; let newName = baseName;
      while(currentEditOptions[newName]) { count++; newName = `${baseName}${count}`; }
      currentEditOptions[newName] = [["選項1", 0]]; 
      renderOptionsBuilderUI();
    }
    
    function deleteOptionGroup(groupName) {
      if(confirm(`確定刪除「${groupName}」整個群組嗎？`)) {
        delete currentEditOptions[groupName]; renderOptionsBuilderUI();
      }
    }

    function renameOptionGroup(oldName, newName) {
      newName = newName.trim();
      if (!newName || newName === oldName) return renderOptionsBuilderUI();
      if (currentEditOptions[newName]) { alert("此群組名稱已存在！"); return renderOptionsBuilderUI(); }
      const newObj = {};
      for(let key in currentEditOptions) {
        if(key === oldName) newObj[newName] = currentEditOptions[key];
        else newObj[key] = currentEditOptions[key];
      }
      currentEditOptions = newObj; renderOptionsBuilderUI();
    }

    function addOptionItem(groupName) { currentEditOptions[groupName].push(["新選項", 0]); renderOptionsBuilderUI(); }

    function updateOptionItem(groupName, index, field, value) {
      let opt = currentEditOptions[groupName][index];
      let name = Array.isArray(opt) ? opt[0] : opt; let price = Array.isArray(opt) ? opt[1] : 0;
      if (field === 'name') name = value.trim() || "未命名";
      if (field === 'price') price = parseInt(value) || 0;
      currentEditOptions[groupName][index] = [name, price];
    }

    function deleteOptionItem(groupName, index) { currentEditOptions[groupName].splice(index, 1); renderOptionsBuilderUI(); }

    function saveItemToLocalData() {
      const name = document.getElementById('edit-item-name').value.trim();
      const price = parseFloat(document.getElementById('edit-item-price').value) || 0;
      const image = document.getElementById('edit-item-image').value.trim();

      if (!name) return alert("請輸入品項名稱！");
      const finalOptions = {};
      for(let key in currentEditOptions) {
        if (currentEditOptions[key].length > 0) {
          finalOptions[key] = currentEditOptions[key].map(opt => {
            const optName = Array.isArray(opt) ? opt[0] : opt; const optPrice = Array.isArray(opt) ? opt[1] : 0;
            return optPrice === 0 ? optName : [optName, optPrice];
          });
        }
      }
      const newItem = { id: `temp-${Date.now()}`, name, price, image, options: finalOptions, category: currentMenuTab };
      if (editingItemIndex === -1) adminMenuData[currentMenuTab].push(newItem);
      else adminMenuData[currentMenuTab][editingItemIndex] = newItem;
      
      closeMenuEditorModal(); renderAdminMenuList(currentMenuTab);
    }

    function deleteMenuItemFromLocal(index) {
      if(confirm("確定要刪除這個品項嗎？ (刪除後需點擊「儲存至雲端」才會真正生效)")) {
        adminMenuData[currentMenuTab].splice(index, 1); renderAdminMenuList(currentMenuTab);
      }
    }

    function saveMenuToServer() {
      const btn = document.getElementById('save-menu-server-btn');
      btn.disabled = true; btn.innerHTML = `<div class="loading-spinner border-white border-t-transparent w-5 h-5 inline-block"></div> 正在同步至試算表...`;
      runGas('saveMenuData', res => {
        btn.disabled = false; btn.innerHTML = `☁️ 將此分類儲存至雲端試算表`;
        if (res.success) showAlertModal(res.message); else showAlertModal(res.message);
      }, showGasError, currentMenuTab, adminMenuData[currentMenuTab]);
    }

    function loadAdminSettings() {
        document.getElementById('admin-tab-settings').innerHTML = '<p class="text-center p-8 text-gray-500">載入設定中...</p>';
        runGas('getAdminSettings', res => {
            if (res.error) { showGasError(res); return; }
            document.getElementById('admin-tab-settings').innerHTML = `
                <div class="bg-white p-5 rounded-lg shadow-sm border space-y-4">
                    <div>
                        <label class="block font-bold text-gray-700 mb-1">截單時間 (超過此時間自動關閉點餐)</label>
                        <input type="datetime-local" id="set-cutoff" value="${res.cutoff}" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-300 outline-none">
                    </div>
                    <div>
                        <label class="block font-bold text-gray-700 mb-1">跑馬燈公告</label>
                        <input type="text" id="set-ann" value="${res.ann}" placeholder="例如：本週五前請完成點餐喔！" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-300 outline-none">
                    </div>
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="block font-bold text-gray-700 mb-1">午餐店名</label>
                            <input type="text" id="set-lunch" value="${res.lunchStore}" placeholder="例如: 麥當勞" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-300 outline-none">
                        </div>
                        <div class="flex-1">
                            <label class="block font-bold text-gray-700 mb-1">飲料店名</label>
                            <input type="text" id="set-drink" value="${res.drinkStore}" placeholder="例如: 50嵐" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-300 outline-none">
                        </div>
                    </div>
                    <hr class="my-4 border-gray-200">
                    <div>
                        <label class="block font-bold text-red-600 mb-1">🔑 後台管理員密碼</label>
                        <input type="text" id="set-pwd" value="${res.pwd}" class="w-full p-2 border border-red-200 rounded focus:ring-2 focus:ring-red-300 outline-none text-red-600 font-bold">
                        <p class="text-xs text-gray-400 mt-1">預設為 0000，修改後請務必牢記</p>
                    </div>
                    <button onclick="saveAdminSettingsUI()" class="w-full py-3 mt-4 bg-green-600 text-white font-bold rounded-lg shadow-md hover:bg-green-700 transition">💾 儲存所有設定</button>
                </div>
            `;
        }, showGasError);
    }

    function saveAdminSettingsUI() {
        const data = {
            cutoff: document.getElementById('set-cutoff').value,
            ann: document.getElementById('set-ann').value,
            lunchStore: document.getElementById('set-lunch').value,
            drinkStore: document.getElementById('set-drink').value,
            pwd: document.getElementById('set-pwd').value
        };
        const btn = document.querySelector('#admin-tab-settings button');
        btn.disabled = true; btn.textContent = "儲存中...";
        
        runGas('saveSystemSettings', res => {
            if(res.success) {
                showAlertModal(res.message);
                storeNames.lunch = data.lunchStore || '午餐';
                storeNames.drink = data.drinkStore || '飲料';
                document.getElementById('lunch-title').textContent = `🍝 ${storeNames.lunch} (擇一)`;
                document.getElementById('drink-title').textContent = `🥤 ${storeNames.drink} (擇一)`;
                document.getElementById('summary-btn-lunch').textContent = `${storeNames.lunch}統計`;
                document.getElementById('summary-btn-drink').textContent = `${storeNames.drink}統計`;
                document.getElementById('menu-tab-lunch').textContent = `${storeNames.lunch}菜單`;
                document.getElementById('menu-tab-drink').textContent = `${storeNames.drink}菜單`;
                loadAdminSettings(); 
            } else {
                showAlertModal(res.message);
            }
        }, showGasError, data);
    }
  </script>
</body>
</html>
